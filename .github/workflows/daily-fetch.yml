name: Daily Data Fetch

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 14 * * 6'
  workflow_dispatch:

jobs:
  fetch-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4 pandas numpy yfinance

      - name: Fetch VC blogs
        run: python scripts/fetch_vc.py

      - name: Fetch CFTC data
        run: python scripts/fetch_cftc.py
        continue-on-error: true

      - name: Commit all data
        run: |
          git config user.name "shrimp-bot"
          git config user.email "bot@shrimp.dev"
          git add data/
          git diff --staged --quiet || git commit -m "data update $(date -u +%Y-%m-%d)"
          git push
